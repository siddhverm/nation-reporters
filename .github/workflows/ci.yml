name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint API
        run: cd apps/api && npm run lint

      - name: Lint Web
        run: cd apps/web && npm run lint

      - name: Build API
        run: cd apps/api && npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nationreporters
          JWT_SECRET: ci-test-secret-at-least-32-characters-long
          JWT_REFRESH_SECRET: ci-test-refresh-secret-32-chars-long
          GEMINI_API_KEY: dummy
          REDIS_URL: redis://localhost:6379
          S3_ENDPOINT: http://localhost:9000
          S3_BUCKET: test
          S3_ACCESS_KEY: test
          S3_SECRET_KEY: test
          MEILISEARCH_URL: http://localhost:7700
          MEILISEARCH_KEY: test

      - name: Test API
        run: cd apps/api && npm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nationreporters
          JWT_SECRET: ci-test-secret-at-least-32-characters-long
          JWT_REFRESH_SECRET: ci-test-refresh-secret-32-chars-long
          GEMINI_API_KEY: dummy
          REDIS_URL: redis://localhost:6379
          S3_ENDPOINT: http://localhost:9000
          S3_BUCKET: test
          S3_ACCESS_KEY: test
          S3_SECRET_KEY: test
          MEILISEARCH_URL: http://localhost:7700
          MEILISEARCH_KEY: test
