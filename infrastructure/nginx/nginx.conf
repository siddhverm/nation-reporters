# HTTP → HTTPS redirect
server {
    listen 80;
    server_name nationreporters.com www.nationreporters.com;
    return 301 https://nationreporters.com$request_uri;
}

# www → non-www redirect (HTTPS)
server {
    listen 443 ssl;
    server_name www.nationreporters.com;
    ssl_certificate /etc/letsencrypt/live/nationreporters.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nationreporters.com/privkey.pem;
    return 301 https://nationreporters.com$request_uri;
}

server {
    listen 443 ssl;
    server_name nationreporters.com;

    ssl_certificate /etc/letsencrypt/live/nationreporters.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nationreporters.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # API
    location /api/ {
        proxy_pass http://api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 50M;
    }

    # Next.js app
    location / {
        proxy_pass http://web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }

    # Next.js static files
    location /_next/static/ {
        proxy_pass http://web:3000;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_comp_level 6;
    gzip_min_length 1000;
}
