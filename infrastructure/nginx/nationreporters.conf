# Drop this file into /etc/nginx/conf.d/ or /etc/nginx/sites-enabled/
# alongside Talent Setu's config. Both sites share the same nginx on the VPS.

# HTTP → HTTPS
server {
    listen 80;
    server_name nationreporters.com www.nationreporters.com;
    return 301 https://nationreporters.com$request_uri;
}

# www → non-www
server {
    listen 443 ssl;
    server_name www.nationreporters.com;
    ssl_certificate /etc/letsencrypt/live/nationreporters.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nationreporters.com/privkey.pem;
    return 301 https://nationreporters.com$request_uri;
}

server {
    listen 443 ssl;
    server_name nationreporters.com;

    ssl_certificate /etc/letsencrypt/live/nationreporters.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nationreporters.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # NestJS API (port 3001 on host)
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 50M;
    }

    # Next.js web (port 3000 on host)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_comp_level 6;
    gzip_min_length 1000;
}
